server.port=8084

spring.application.name=notification-service

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${NOTIFICATION_DB_HOST:localhost}:3306/notification_db
spring.datasource.username=${NOTIFICATION_DB_USER:root}
spring.datasource.password=${NOTIFICATION_DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT (from common-lib JwtAuthFilter) ───────────────────────────────────────
jwt.secret=${JWT_SECRET:QueryHubSuperSecretKeyForJWTTokenGeneration2024Phase1}
jwt.expiration.ms=86400000

# ── Kafka Consumer ────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.queryhub.common.events,com.queryhub.*
spring.kafka.consumer.properties.spring.json.use.type.headers=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.com.queryhub.notification=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=INFO
