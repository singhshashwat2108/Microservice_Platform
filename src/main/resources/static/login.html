<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — QueryBoard</title>
  <link rel="stylesheet" href="shared.css"/>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Query<span>Board</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="view.html">Queries</a>
    <a href="login.html" class="active">Login</a>
    <a href="register.html" class="btn-nav">Register</a>
  </div>
</nav>

<div class="page auth-layout">
  <div class="card auth-card">

    <h1>Welcome back</h1>
    <p class="subtitle">Login to raise and manage queries.</p>

    <div id="alert" class="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="your_username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">
        Login
      </button>
    </form>

    <div class="divider" style="margin-top:20px;">or</div>

    <p class="auth-footer" style="margin-top:16px;">
      Don't have an account? <a href="register.html">Register</a>
    </p>

  </div>
</div>

<script>
  const form      = document.getElementById('loginForm');
  const alertBox  = document.getElementById('alert');
  const submitBtn = document.getElementById('submitBtn');

  function showAlert(msg, type) {
    alertBox.textContent = msg;
    alertBox.className   = `alert ${type} show`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.className = 'alert';
    submitBtn.textContent = 'Logging in…';
    submitBtn.disabled = true;

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      showAlert('Please fill in all fields.', 'error');
      submitBtn.textContent = 'Login';
      submitBtn.disabled = false;
      return;
    }

    try {
      const res  = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert(data.message || 'Login failed.', 'error');
        submitBtn.textContent = 'Login';
        submitBtn.disabled = false;
        return;
      }

      // Store JWT and username in sessionStorage
      sessionStorage.setItem('token',    data.token);
      sessionStorage.setItem('username', data.username);

      showAlert('Login successful! Redirecting…', 'success');
      setTimeout(() => window.location.href = 'view.html', 800);

    } catch (err) {
      showAlert('Could not reach the server.', 'error');
      submitBtn.textContent = 'Login';
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
