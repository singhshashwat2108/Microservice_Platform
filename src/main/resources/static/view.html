<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Queries — QueryBoard</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .page-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .page-header p { font-size: 0.82rem; color: var(--text-3); margin-top: 2px; }

    /* ─── Filter bar ─────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-bar select {
      width: auto;
      min-width: 180px;
      padding: 8px 12px;
    }

    .filter-bar .btn { padding: 8px 16px; width: auto; }

    /* ─── Query cards ────────────────────────────────────── */
    .queries-list { display: flex; flex-direction: column; gap: 12px; }

    .query-card { padding: 20px 22px; transition: box-shadow 0.15s; }
    .query-card:hover { box-shadow: var(--shadow-lg); }

    .query-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .topic-badge {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 3px 8px;
      border-radius: 99px;
    }

    .query-owner {
      font-size: 0.75rem;
      color: var(--text-3);
    }

    .query-date {
      font-size: 0.72rem;
      color: var(--text-3);
      margin-left: auto;
    }

    .query-text {
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .query-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .query-footer .btn {
      padding: 5px 12px;
      font-size: 0.75rem;
      width: auto;
      gap: 4px;
    }

    /* ─── Empty / loading states ─────────────────────────── */
    .state-box {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-3);
    }

    .state-box .icon { font-size: 2rem; margin-bottom: 12px; }
    .state-box p { font-size: 0.85rem; }
    .state-box a { color: var(--accent); text-decoration: none; font-weight: 500; }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Query<span>Board</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="view.html" class="active">Queries</a>
    <span id="navAuth"></span>
  </div>
</nav>

<div class="page page-inner">

  <div class="page-header">
    <div>
      <h1>All Queries</h1>
      <p id="queryCount">Loading…</p>
    </div>
    <a href="raise.html" class="btn btn-accent" id="raiseBtn" style="display:none; width:auto;">
      + Raise Query
    </a>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <select id="topicFilter">
      <option value="">All Topics</option>
    </select>
    <button class="btn btn-ghost" onclick="loadQueries()">Filter</button>
  </div>

  <!-- List -->
  <div id="queriesList" class="queries-list">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Loading queries…</p>
    </div>
  </div>

</div>

<script>
  const token    = sessionStorage.getItem('token');
  const username = sessionStorage.getItem('username');

  // ─── Nav: show login or username + logout ─────────────
  const navAuth = document.getElementById('navAuth');
  if (token && username) {
    navAuth.innerHTML = `
      <span style="font-size:0.78rem; color:var(--text-3); padding:0 8px;">@${username}</span>
      <a href="#" onclick="logout()" style="font-size:0.82rem;font-weight:500;color:var(--text-2);padding:6px 12px;border-radius:8px;text-decoration:none;">Logout</a>`;
    document.getElementById('raiseBtn').style.display = 'inline-flex';
  } else {
    navAuth.innerHTML = `
      <a href="login.html">Login</a>
      <a href="register.html" class="btn-nav">Register</a>`;
  }

  function logout() {
    sessionStorage.clear();
    window.location.reload();
  }

  // ─── Load categories for filter ───────────────────────
  async function loadCategories() {
    try {
      const res  = await fetch('/category');
      const data = await res.json();
      const sel  = document.getElementById('topicFilter');
      data.forEach(c => {
        const opt = document.createElement('option');
        opt.value       = c.name;
        opt.textContent = c.name;
        sel.appendChild(opt);
      });
    } catch (_) {}
  }

  // ─── Load queries ─────────────────────────────────────
  async function loadQueries() {
    const list  = document.getElementById('queriesList');
    const topic = document.getElementById('topicFilter').value;
    const url   = topic ? `/view?topic=${encodeURIComponent(topic)}` : '/view';

    list.innerHTML = `<div class="state-box"><div class="spinner"></div><p>Loading…</p></div>`;

    try {
      const res  = await fetch(url);
      const data = await res.json();

      document.getElementById('queryCount').textContent =
        `${data.length} quer${data.length === 1 ? 'y' : 'ies'}`;

      if (!data.length) {
        list.innerHTML = `<div class="state-box">
          <div class="icon">💬</div>
          <p>No queries yet. <a href="raise.html">Be the first to raise one.</a></p>
        </div>`;
        return;
      }

      list.innerHTML = data.map(q => `
        <div class="card query-card">
          <div class="query-meta">
            <span class="topic-badge">${q.topic}</span>
            <span class="query-owner">by @${q.owner}</span>
            <span class="query-date">${formatDate(q.createdAt)}</span>
          </div>
          <p class="query-text">${escHtml(q.queryText)}</p>
          <div class="query-footer">
            <button class="btn btn-ghost" onclick="likeQuery(${q.id}, this)">
              ♡ Like
            </button>
          </div>
        </div>
      `).join('');

    } catch (err) {
      list.innerHTML = `<div class="state-box">
        <div class="icon">⚠️</div>
        <p>Could not load queries. Make sure the server is running.</p>
      </div>`;
    }
  }

  // ─── Like a query ─────────────────────────────────────
  async function likeQuery(id, btn) {
    btn.disabled = true;
    try {
      await fetch(`/Query/${id}/like`, { method: 'POST' });
      btn.textContent = '♥ Liked';
      btn.style.color = 'var(--accent)';
    } catch (_) {
      btn.disabled = false;
    }
  }

  // ─── Helpers ──────────────────────────────────────────
  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-IN', {
      day: 'numeric', month: 'short', year: 'numeric'
    });
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  loadCategories();
  loadQueries();
</script>
</body>
</html>
