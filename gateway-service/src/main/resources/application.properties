server.port=8080
spring.application.name=gateway-service

# Routing
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=query-service
spring.cloud.gateway.routes[1].uri=${QUERY_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/query/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=comments-service
spring.cloud.gateway.routes[2].uri=${QUERY_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/comments/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[3].id=likes-service
spring.cloud.gateway.routes[3].uri=${QUERY_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/likes/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[4].id=view-service
spring.cloud.gateway.routes[4].uri=${VIEW_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/view/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1
