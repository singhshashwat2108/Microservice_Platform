services:
  auth-db:
    image: mysql:8.4
    container_name: queryhub-auth-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    volumes:
      - auth_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  query-db:
    image: mysql:8.4
    container_name: queryhub-query-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: query_db
    volumes:
      - query_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-db:
    image: mysql:8.4
    container_name: queryhub-notification-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notification_db
    volumes:
      - notification_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: queryhub-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "*"
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep -i mode"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: queryhub-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO"
      KAFKA_LOG4J_ROOT_LOGLEVEL: "INFO"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 15s
      timeout: 10s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: queryhub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: queryhub-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://auth-db:3306/auth_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: QueryHubSuperSecretKeyForJWTTokenGeneration2024Phase1
    depends_on:
      auth-db:
        condition: service_healthy

  query-service:
    build:
      context: .
      dockerfile: query-service/Dockerfile
    container_name: queryhub-query-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://query-db:3306/query_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: QueryHubSuperSecretKeyForJWTTokenGeneration2024Phase1
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      query-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  view-service:
    build:
      context: .
      dockerfile: view-service/Dockerfile
    container_name: queryhub-view-service
    ports:
      - "8083:8083"
    environment:
      QUERY_SERVICE_URL: http://query-service:8082
      JJWT_SECRET: QueryHubSuperSecretKeyForJWTTokenGeneration2024Phase1
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - query-service
      - redis

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: queryhub-notification-service
    ports:
      - "8084:8084"
    environment:
      NOTIFICATION_DB_HOST: notification-db
      NOTIFICATION_DB_USER: root
      NOTIFICATION_DB_PASS: root
      JWT_SECRET: QueryHubSuperSecretKeyForJWTTokenGeneration2024Phase1
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      notification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: queryhub-gateway-service
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      QUERY_SERVICE_URL: http://query-service:8082
      VIEW_SERVICE_URL: http://view-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
    depends_on:
      - auth-service
      - query-service
      - view-service
      - notification-service

volumes:
  auth_db_data:
  query_db_data:
  notification_db_data:
